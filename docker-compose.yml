services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - /opt/qr-tickets/postgres:/var/lib/postgresql/data
    env_file:
      - /opt/qr-tickets/env/postgres.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-qr_user} -d ${DB_NAME:-qr_tickets}"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:4100:4100"
    env_file:
      - /opt/qr-tickets/env/backend.env
    volumes:
      - /opt/qr-tickets/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_TURNSTILE_SITE_KEY: 0x4AAAAAACvSVcx9MZpYOW7G
    restart: unless-stopped
    ports:
      - "127.0.0.1:4173:4173"
