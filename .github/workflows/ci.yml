name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend Safety Checks
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      SENTRY_DSN: ""
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/qr_tickets_test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: qr_tickets_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d qr_tickets_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check backend JavaScript
        run: |
          find . -name "*.js" -not -path "./node_modules/*" -print0 | xargs -0 -n1 node --check

      - name: Run backend integration tests (required)
        run: |
          npm run test:scan
          npm run test:request-approval
          npm run test:cancellation
          npm run test:organizer-recovery

      - name: Audit backend dependencies (high+)
        run: npm audit --audit-level=high

  frontend:
    name: Frontend Safety Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Audit frontend dependencies (high+)
        run: npm audit --audit-level=high
