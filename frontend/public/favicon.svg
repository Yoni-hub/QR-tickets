<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- White background -->
  <rect width="64" height="64" rx="10" fill="#ffffff"/>

  <!-- Outer QR frame corners — top left -->
  <rect x="10" y="10" width="18" height="3" fill="#2979ff"/>
  <rect x="10" y="10" width="3" height="18" fill="#2979ff"/>
  <rect x="10" y="25" width="18" height="3" fill="#2979ff"/>
  <rect x="25" y="10" width="3" height="18" fill="#2979ff"/>

  <!-- Outer QR frame corners — top right -->
  <rect x="36" y="10" width="18" height="3" fill="#2979ff"/>
  <rect x="51" y="10" width="3" height="18" fill="#2979ff"/>
  <rect x="36" y="25" width="18" height="3" fill="#2979ff"/>
  <rect x="36" y="10" width="3" height="18" fill="#2979ff"/>

  <!-- Outer QR frame corners — bottom left -->
  <rect x="10" y="36" width="18" height="3" fill="#2979ff"/>
  <rect x="10" y="36" width="3" height="18" fill="#2979ff"/>
  <rect x="10" y="51" width="18" height="3" fill="#2979ff"/>
  <rect x="25" y="36" width="3" height="18" fill="#2979ff"/>

  <!-- Inner QR dots (center pattern) -->
  <rect x="15" y="15" width="10" height="10" rx="1" fill="#2979ff" opacity="0.9"/>
  <rect x="39" y="15" width="10" height="10" rx="1" fill="#2979ff" opacity="0.9"/>
  <rect x="15" y="39" width="10" height="10" rx="1" fill="#2979ff" opacity="0.9"/>

  <!-- Small QR data dots -->
  <rect x="30" y="30" width="4" height="4" fill="#2979ff"/>
  <rect x="36" y="36" width="4" height="4" fill="#2979ff"/>
  <rect x="42" y="30" width="4" height="4" fill="#2979ff"/>
  <rect x="30" y="42" width="4" height="4" fill="#2979ff"/>
  <rect x="36" y="30" width="4" height="4" fill="#2979ff" opacity="0.5"/>
  <rect x="42" y="42" width="4" height="4" fill="#2979ff" opacity="0.5"/>
  <rect x="48" y="36" width="4" height="4" fill="#2979ff"/>
  <rect x="30" y="36" width="4" height="4" fill="#2979ff" opacity="0.7"/>
  <rect x="48" y="48" width="4" height="4" fill="#2979ff" opacity="0.7"/>
</svg>
