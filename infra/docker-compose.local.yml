services:
  postgres:
    image: postgres:16
    container_name: qr_tickets_postgres
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-qr_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in infra/.env.local}
      POSTGRES_DB: ${POSTGRES_DB:-qr_tickets}
    ports:
      - "5434:5432"
    volumes:
      - qr_tickets_pgdata:/var/lib/postgresql/data

volumes:
  qr_tickets_pgdata:
